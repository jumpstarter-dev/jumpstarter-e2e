---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: qemu-exporter
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qemu-exporter
spec:
  serviceName: qemu-exporter
  replicas: 3
  selector:
    matchLabels:
      exporter-mock: qemu
  template:
    metadata:
      labels:
        exporter-mock: qemu
    spec:
      serviceAccountName: qemu-exporter
      restartPolicy: Always
      containers:
        - name: jumpstarter-exporter
          image: quay.io/ncao/jumpstarter:summit
          imagePullPolicy: IfNotPresent
          env:
            - name: JUMPSTARTER_GRPC_INSECURE
              value: "1"
          command:
            - /bin/bash
            - -c
            - |
              jmp exporter login default \
                --endpoint jumpstarter-grpc.jumpstarter-lab.svc.cluster.local:8082 \
                --namespace default --name $(cat /etc/hostname) \
                --issuer https://dex.dex.svc.cluster.local:5556 \
                --connector-id kubernetes \
                --token $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)

              jmp exporter run default
